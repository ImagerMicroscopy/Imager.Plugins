name: Build Microscope Plugins
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        microscope: [nikon_ti1,nikon_ti2,olympus_ix83,dummy,do_nothing]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja

      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      # 1. Build MicroscopeBody
      - name: Configure MicroscopeBody (${{ matrix.microscope }})
        run: |
          cd MicroscopeBody/src
          meson setup ../build -Dmicroscope_type=${{ matrix.microscope }} --buildtype=release

      - name: Compile MicroscopeBody (${{ matrix.microscope }})
        run: |
          cd MicroscopeBody/src
          meson compile -C ../build

      # 2. Build OlympusRTC
      - name: Build OlympusRTC
        run: |
          cd OlympusRTC/src
          meson setup ../build --buildtype=release
          meson compile -C ../build

      # 3. Build VisiTIRF
      - name: Build VisiTIRF
        run: |
          cd VisiTIRF/src
          meson setup ../build --buildtype=release
          meson compile -C ../build

      # 4. Upload Binaries
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MicroscopeControl-${{ matrix.microscope }}
          path: |
            MicroscopeBody/build/*.dll
            OlympusRTC/build/*.dll
            VisiTIRF/build/*.dll
        
